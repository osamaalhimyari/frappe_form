targets:
  $default:
    builders:
      json_serializable:
        enabled: true
        options:
          # Options configure how source code is generated for every
          # `@JsonSerializable`-annotated class in the package.
          #
          # The default value for each is listed.
          #          any_map: false
          #          checked: false
          #          constructor: ""
          #          create_factory: true
          #          create_field_map: false
          #          create_per_field_to_json: false
          #          create_to_json: true
          #          disallow_unrecognized_keys: false
          #          explicit_to_json: false
          #          field_rename: none
          #          generic_argument_factories: false
          #          ignore_unannotated: false
          include_if_null: false
#          create_json_keys: true
        generate_for:
          - '**/entity/*.dart'
          - '**/model/*.dart'
      adeptgenerator:
        enabled: true
        generate_for:
          - '**/entity/*.dart'
          - '**/model/*.dart'
        options:
          copy_with_ignore_synthetic: false
          copy_with_allow_nullable: false
          copy_with_consider_empty_collection_as_null: true
          copy_with_include_private_fields: false
          copy_with_avoid_constructor: false